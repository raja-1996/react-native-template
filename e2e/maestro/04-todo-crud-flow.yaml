appId: ${APP_ID}
env:
  APP_ID: com.template.reactnative
  TEST_EMAIL: e2e_test@gmail.com
  TEST_PASSWORD: E2ePass123!
---
- launchApp:
    clearState: true

# --- Login ---
- extendedWaitUntil:
    visible:
      text: "Welcome Back"
    timeout: 20000

- assertVisible: "Welcome Back"

- tapOn:
    id: "email-input"
- inputText: ${TEST_EMAIL}

- tapOn:
    id: "password-input"
- inputText: ${TEST_PASSWORD}

- tapOn:
    id: "login-button"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Todos"
    timeout: 20000

# --- Assert todos screen loaded (empty state or existing todos) ---
- assertVisible:
    text: "Todos"

# --- Create new todo ---
- tapOn: "+"

- extendedWaitUntil:
    visible:
      text: "What needs to be done?"
    timeout: 5000

- assertVisible: "What needs to be done?"

- tapOn:
    id: "title-input"
- inputText: "E2E Test Todo"

- tapOn:
    id: "description-input"
- inputText: "Created by Maestro"

- tapOn: "Save"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "E2E Test Todo"
    timeout: 5000

- assertVisible: "E2E Test Todo"

# --- Open todo detail ---
- tapOn: "E2E Test Todo"

- extendedWaitUntil:
    visible:
      text: "Mark Complete"
    timeout: 5000

# --- Mark Complete ---
- tapOn: "Mark Complete"

- waitForAnimationToEnd

- assertVisible: "Mark Incomplete"

# --- Delete todo ---
- tapOn: "Delete Todo"

# Handle confirmation alert
- extendedWaitUntil:
    visible:
      text: "This action cannot be undone."
    timeout: 5000

- tapOn: "Delete"

- waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Todos"
    timeout: 5000

- extendedWaitUntil:
    notVisible:
      text: "E2E Test Todo"
    timeout: 5000

- assertNotVisible: "E2E Test Todo"
